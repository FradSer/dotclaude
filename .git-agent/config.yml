scopes:
    - name: acpx
      description: Agent communication, task delegation, and cross-agent research in acpx/; does not cover antigravity/.
    - name: ag
      description: Antigravity managed agent plugin and delegate workers in antigravity/; does not cover acpx/.
    - name: as
      description: Autonomous ML experimentation, GAN workflows, and rolling research in autoresearch/; does not cover plugins.
    - name: cctx
      description: Code context research, environment mapping, and repository analysis in code-context/.
    - name: fe
      description: Frontend framework tools, impeccable design system, and react patterns in frontend/.
    - name: git
      description: Git repository configuration, setup utilities, and commit hooks in git/; does not cover gitflow.
    - name: gitflow
      description: Gitflow branch management, releases, and feature/hotfix workflows in gitflow/.
    - name: github
      description: GitHub PR monitoring, triage, and feedback loops in github/.
    - name: hw
      description: KiCad CLI and EDA hardware tooling (use-kicad-cli skill) in hardware/.
    - name: office
      description: Lark suite integration and office productivity tools in office/; does not cover coding tools.
    - name: po
      description: Plugin optimizer framework for validation and metadata in plugin-optimizer/.
    - name: refactor
      description: Code simplification and refactoring agent and skills in refactor/.
    - name: sp
      description: Superpowers autonomous planning, evaluation loops, and task execution in superpowers/.
    - name: storm
      description: STORM article generation pipeline and researcher agents in storm/.
    - name: swiftui
      description: SwiftUI code review and modern API best practices in swiftui/.
    - name: utils
      description: Documentation, changelog, and project maintenance utilities in utils/.

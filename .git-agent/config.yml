      description: office productivity tools, including lark and prd generation in office/; does not cover general code skills
    - name: po
      description: plugin optimization agents and validation scripts in plugin-optimizer/; does not cover general plugin config
    - name: sp
      description: superpowers framework for planning, evaluation, and execution in superpowers/; does not cover general utilities

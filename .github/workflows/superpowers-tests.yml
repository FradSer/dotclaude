name: superpowers tests

on:
  push:
    paths:
      - "superpowers/**"
      - ".github/workflows/superpowers-tests.yml"
  pull_request:
    paths:
      - "superpowers/**"
      - ".github/workflows/superpowers-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run superpowers shell tests
        run: python3 -m pytest superpowers/tests/ -q
      - name: Validate plugin manifest
        run: python3 plugin-optimizer/scripts/validate-plugin.py superpowers
